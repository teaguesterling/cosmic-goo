name = "recent"
tier = "desktop"
description = "Recently-opened files (freedesktop ~/.local/share/recently-used.xbel)"

# Items emit `inode/file` so the existing files-plugin verbs (open, reveal, read,
# copy-path, preview) apply directly — no per-recent verb set. Reach via:
#   :recent/<path>     — exact path
#   :recent:<query>    — fuzzy search across recent titles
#   :recent            — first item (defaulting subject)

[[sources]]
name = "recent"
prefix = "recent"
icon = "document-open-recent"
emits = "inode/file"
# Stale entries (file deleted since) are filtered out. Python is used because
# xbel is XML and shelling out to xmllint + sed for href + title gets ugly fast;
# python3 is on every freedesktop system.
list_cmd = '''python3 -c "
import xml.etree.ElementTree as ET, json, os, sys, urllib.parse
p = os.path.expanduser('~/.local/share/recently-used.xbel')
if not os.path.exists(p):
    print('[]'); sys.exit(0)
try:
    root = ET.parse(p).getroot()
except ET.ParseError:
    print('[]'); sys.exit(0)
out = []
for bm in root.findall('bookmark'):
    href = bm.get('href', '')
    if not href.startswith('file://'):
        continue
    path = urllib.parse.unquote(href[7:])
    if not os.path.exists(path):
        continue
    title_el = bm.find('title')
    name = (title_el.text if title_el is not None and title_el.text else os.path.basename(path)) or path
    visited = bm.get('visited', '')
    out.append({
        'id': path,
        'title': name,
        'subtitle': path,
        'text': path,
        'metadata': {'path': path, 'visited': visited},
    })
# most-recent first
out.sort(key=lambda i: i['metadata'].get('visited', ''), reverse=True)
print(json.dumps(out))
"'''
