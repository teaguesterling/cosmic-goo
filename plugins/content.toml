name = "content"
tier = "core"
description = "Inspect structured + non-text content: JSON, images, audio/video, directories"

# These verbs accept *content* MIME types (not handle types). A subject reaches
# them three ways:
#   - a native path:   goo json-pretty ./data.json   (resolve_file types it)
#   - a :files: handle: goo image-info :files:photo
#   - raw stdin/positional whose type the engine infers (json-shape) — Rust only.
# File-backed subjects carry {subject.metadata.path}; inline ones carry
# {subject.text}. Verbs that take either branch on the path, like sha256.

# ---------------- JSON (application/json) ----------------
# The inference consumers: a bare positional `{"k":1}` only reaches these once
# the engine infers application/json from JSON shape (Rust engine).

[[types]]
name = "application/json"
display = "JSON"
kind = "content"
# JSON *is* text — displayable/pageable as text/plain. The structured-suffix rule
# only relates same-top-level types (application/x+json <: application/json), so
# this cross-family supertype must be declared. Lets the negotiation engine
# present JSON as text without a dedicated converter (Rust lattice; §negotiation).
is_a = ["text/plain"]

[[verbs]]
name = "json-pretty"
description = "Pretty-print JSON (jq .)"
accepts = ["application/json"]
default_for = "application/json"
cmd = "p={subject.metadata.path|q}; if [ -n \"$p\" ] && [ -f \"$p\" ]; then jq . -- \"$p\"; else jq . <<< {subject.text|q}; fi"

[[verbs]]
name = "json-keys"
description = "List a JSON object's top-level keys (or array indices)"
accepts = ["application/json"]
cmd = "p={subject.metadata.path|q}; if [ -n \"$p\" ] && [ -f \"$p\" ]; then src=\"$(cat -- \"$p\")\"; else src={subject.text|q}; fi; jq -r 'if type==\"object\" then keys[] elif type==\"array\" then range(0;length)|tostring else empty end' <<< \"$src\""

# ---------------- images (image/*) ----------------

[[verbs]]
name = "image-info"
description = "Dimensions, format, and size of an image (ImageMagick identify)"
accepts = ["image/*"]
default_for = "image/*"
cmd = "identify -format '%wx%h %m %b\\n' -- {subject.metadata.path|q}"

# ---------------- audio / video (audio/*, video/*) ----------------
# Needs ffprobe (ffmpeg). Documented dependency; the verb ships regardless.

[[verbs]]
name = "media-info"
description = "Duration, codec, and stream summary of an audio/video file (ffprobe)"
accepts = ["audio/*", "video/*"]
cmd = "ffprobe -hide_banner -- {subject.metadata.path|q}"

# ---------------- directories (inode/directory) ----------------

[[verbs]]
name = "dir-tree"
description = "Two-level tree listing of a directory"
accepts = ["inode/directory"]
default_for = "inode/directory"
cmd = "tree -L 2 -- {subject.metadata.path|q}"

[[verbs]]
name = "dir-size"
description = "Total on-disk size of a directory (du -sh)"
accepts = ["inode/directory"]
cmd = "du -sh -- {subject.metadata.path|q} | awk '{print $1}'"
