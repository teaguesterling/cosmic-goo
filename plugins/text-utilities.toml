name = "text-utilities"
description = "Pure-text transforms — base64, hashing, case shifting, counting, escaping"

# {subject.text|q} shell-quotes the content so it survives as a single safe
# token regardless of embedded quotes/newlines/metacharacters.
#
# Byte-exact verbs (base64, hashes, url-encode, json-string) feed content via
# `printf '%s'` so no trailing newline is added — `goo sha256 "hello"` hashes
# exactly "hello", not "hello\n". Line-oriented verbs (upper/lower/wc/trim)
# use `<<<`, where the trailing newline is harmless or wanted (wc line count).

[[verbs]]
name = "upper"
description = "Convert to UPPERCASE"
accepts = ["text/*"]
cmd = "tr a-z A-Z <<< {subject.text|q}"

[[verbs]]
name = "lower"
description = "Convert to lowercase"
accepts = ["text/*"]
cmd = "tr A-Z a-z <<< {subject.text|q}"

[[verbs]]
name = "wc"
description = "Word, line, and character counts"
accepts = ["text/*"]
cmd = "wc -lwc <<< {subject.text|q}"

[[verbs]]
name = "trim"
description = "Strip leading and trailing whitespace"
accepts = ["text/*"]
cmd = "awk '{$1=$1; print}' <<< {subject.text|q}"

[[verbs]]
name = "base64-encode"
description = "Encode as base64"
accepts = ["text/*"]
cmd = "printf '%s' {subject.text|q} | base64 -w 0"

[[verbs]]
name = "base64-decode"
description = "Decode from base64"
accepts = ["text/*"]
cmd = "printf '%s' {subject.text|q} | base64 -d"

[[verbs]]
name = "url-encode"
description = "Percent-encode for use in a URL"
accepts = ["text/*"]
cmd = "printf '%s' {subject.text|q} | jq -sRr @uri"

[[verbs]]
name = "url-decode"
description = "Decode a percent-encoded string"
accepts = ["text/*"]
cmd = "printf '%s' {subject.text|q} | python3 -c 'import sys, urllib.parse; sys.stdout.write(urllib.parse.unquote(sys.stdin.read()))'"

# Hashing is file-aware: if the subject is a file (has metadata.path), hash the
# file's actual bytes — handles binary and matches `sha256sum <file>` exactly
# (no trailing-newline mangling from reading contents into .text). Otherwise
# hash {subject.text}. So `sha256 "hi"` hashes the text; `sha256 ./img.png`
# hashes the file's bytes.
[[verbs]]
name = "sha256"
description = "SHA-256 hex digest (of file bytes when given a file, else of text)"
accepts = ["text/*", "inode/*", "image/*", "audio/*", "video/*", "application/*"]
cmd = "p={subject.metadata.path|q}; if [ -n \"$p\" ] && [ -f \"$p\" ]; then sha256sum -- \"$p\"; else printf '%s' {subject.text|q} | sha256sum; fi | awk '{print $1}'"

[[verbs]]
name = "md5"
description = "MD5 hex digest (of file bytes when given a file, else of text)"
accepts = ["text/*", "inode/*", "image/*", "audio/*", "video/*", "application/*"]
cmd = "p={subject.metadata.path|q}; if [ -n \"$p\" ] && [ -f \"$p\" ]; then md5sum -- \"$p\"; else printf '%s' {subject.text|q} | md5sum; fi | awk '{print $1}'"

[[verbs]]
name = "json-string"
description = "Wrap text as a JSON-encoded string literal"
accepts = ["text/*"]
cmd = "printf '%s' {subject.text|q} | jq -sR ."

[[verbs]]
name = "shell-escape"
description = "Quote text for safe inclusion in a shell command"
accepts = ["text/*"]
cmd = "printf '%q\\n' {subject.text|q}"
