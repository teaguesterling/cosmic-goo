name = "files"
tier = "desktop"
description = "File operations — open, reveal in file manager, copy path, read"

# Conventions for inode/file subjects (cosmic-goo-wide):
#   - subject.text          = the file's textual CONTENTS (for content verbs)
#   - subject.metadata.path = the absolute path (for reference verbs)
#   - subject.id            = the absolute path (stable identity)
#
# The address resolver (lib/address.sh) populates all three when a file is
# addressed via ./path, ~/path, /path, or +file:. This source enumerates
# regular files in $PWD up to depth 2 for launcher-style fuzzy resolution;
# it sets .text to the path as a cheap placeholder (the resolver fills real
# contents on demand). For deeper traversal, pipe `fd` into a custom source.

[[sources]]
name = "files"
prefix = "file"
icon = "folder"
emits = "inode/file"
enumerate = false   # CWD flood; reach via :file:query or a native ./path
list_cmd = """find . -maxdepth 2 -type f ! -path '*/.git/*' 2>/dev/null \\
  | head -200 \\
  | jq -Rsc 'split("\\n")[:-1] | map(
      ($ENV.PWD + "/" + .[2:]) as $abs |
      {id: $abs, title: ((. | split("/"))[-1]), subtitle: ., text: $abs, metadata: {path: $abs}}
    )'"""

[[verbs]]
name = "open"
description = "Open a file or URL in its default application"
# Polymorphic opener: any addressable entity whose .id is a path or URL.
# xdg-open handles both, so one verb covers files and links (no separate
# open-url). accepts still scopes it; .id is the addressable locator (path for
# a file, the URL for a link) per the subject convention above.
accepts = ["inode/*", "text/x-uri"]
default_for = ["inode/file", "text/x-uri"]
cmd = "xdg-open {subject.id|q}"

[[verbs]]
name = "reveal"
description = "Open the containing folder in the file manager"
accepts = ["inode/*"]
cmd = "xdg-open \"$(dirname {subject.metadata.path|q})\""

[[verbs]]
name = "copy-path"
description = "Copy the absolute path to the clipboard"
accepts = ["inode/*"]
cmd = "wl-copy <<< {subject.metadata.path|q}"

[[verbs]]
name = "read"
description = "Print the file's contents to stdout"
accepts = ["inode/file"]
cmd = "cat {subject.metadata.path|q}"

[[verbs]]
name = "preview"
description = "Print the first 40 lines of the file"
accepts = ["inode/file"]
cmd = "head -40 {subject.metadata.path|q}"
