name = "sigils"
tier = "core"
description = "Default addressing sigils. Override or add your own in ~/.config/cosmic-goo/plugins/."

# A sigil is a single leading character that expands into a canonical goo://
# address. Built-in structural sigils (handled by the engine, not declared here):
#   :dom/path   -> goo://dom/path        (value, exact)
#   :dom:query  -> goo://dom/;q=query     (search, fuzzy)
#   +text       -> goo://text/text        (force literal text)
#   ^ / ^name   -> goo://clip/ , goo://clip/name   (clipboard)
#
# Everything else is yours. `@` ships intentionally undefined; claim it for
# whatever you reach for most, e.g.:
#
#   [[sigils]]
#   char = "@"
#   expands = "goo://app/"     # then @firefox -> goo://app/firefox
#
# `^` is also listed below (matching its built-in expansion) so it shows up in
# tab-completion / discovery.

[[sigils]]
char = "^"
expands = "goo://clip/"
description = "clipboard (^ = current, ^name reserved for named buffers)"
