name = "apps"
tier = "cosmic"
description = "Running applications via cos-cli — activate, close, move, window state"

[[types]]
name = "application/vnd.cos-cli.app"
display = "running app"
kind = "handle"

[[sources]]
name = "apps"
prefix = "app"
icon = "preferences-system-windows"
emits = "application/vnd.cos-cli.app"
# Use full path to cos-cli because ~/.cargo/bin is not on the non-interactive
# bash PATH on this host (see recon/findings.md). When packaged, install
# cos-cli to /usr/bin or rely on the user's PATH instead.
list_cmd = "$HOME/.cargo/bin/cos-cli info --json | jq '[.apps[] | {id: .app_id, title: .title, subtitle: .app_id, metadata: .}]'"

# Per-TOPLEVEL window switcher. cos-cli reports one entry per Wayland toplevel
# already (a multi-window app like CosmicEdit emits N entries with the same
# `app_id` but distinct `index` / `title`). The :app source above uses `app_id`
# as the id, which collides across windows of the same app — fine for "activate
# the app, any window" but loses per-window addressing. :win uses `app_id/index`
# as the id so each window is uniquely addressable: `:win/com.foo.Bar/2` exact;
# `:win:report` fuzzy-by-title. Same vendor type → existing app verbs
# (activate / close / maximize / minimize / fullscreen / move-to) apply via
# accepts dispatch — no new verbs needed.
[[sources]]
name = "windows"
prefix = "win"
icon = "preferences-system-windows"
emits = "application/vnd.cos-cli.app"
list_cmd = '''$HOME/.cargo/bin/cos-cli info --json 2>/dev/null \
  | jq -c '[.apps[] | {
      id: "\(.app_id)/\(.index)",
      title: (.title // .app_id),
      subtitle: "\(.app_id) · ws \(.workspaces[0] // "?")",
      metadata: .
    }]' '''

# The focused app, as an IMPLICIT subject: when a handle verb is run with no
# positional (e.g. a hotkey-bound `goo maximize`), the engine consults
# implicit=true sources emitting an accepted type and takes the first item.
# This is where the old core-lib `focused_app` moved to — keeping cos-cli out
# of the portable engine. enumerate=false so it doesn't duplicate the `apps`
# source in the compose subject list.
[[sources]]
name = "focused"
emits = "application/vnd.cos-cli.app"
implicit = true
enumerate = false
list_cmd = "$HOME/.cargo/bin/cos-cli info --json | jq '[.apps[] | select(.state[]? == \"activated\") | {id: .app_id, title: .title, subtitle: .app_id, metadata: .}] | .[0:1]'"

[[verbs]]
name = "activate"
description = "Bring an app to focus"
accepts = ["application/vnd.cos-cli.app"]
default_for = "application/vnd.cos-cli.app"
cmd = "$HOME/.cargo/bin/cos-cli activate -i {subject.metadata.index}"

[[verbs]]
name = "close"
description = "Close an app"
accepts = ["application/vnd.cos-cli.app"]
cmd = "$HOME/.cargo/bin/cos-cli close -i {subject.metadata.index}"
confirm = true

[[verbs]]
name = "move-to"
description = "Move an app to a workspace"
accepts = ["application/vnd.cos-cli.app"]
object_type = "application/vnd.cos-cli.workspace"
object_source = "workspaces"   # draw object candidates from the workspaces source
cmd = "$HOME/.cargo/bin/cos-cli move -i {subject.metadata.index} -w {object.metadata.index} -g {object.metadata.group_index}"

[[verbs]]
name = "maximize"
description = "Maximize an app window"
accepts = ["application/vnd.cos-cli.app"]
cmd = "$HOME/.cargo/bin/cos-cli state -i {subject.metadata.index} --maximize"

[[verbs]]
name = "minimize"
description = "Minimize an app window"
accepts = ["application/vnd.cos-cli.app"]
cmd = "$HOME/.cargo/bin/cos-cli state -i {subject.metadata.index} --minimize"

[[verbs]]
name = "fullscreen"
description = "Toggle fullscreen for an app window"
accepts = ["application/vnd.cos-cli.app"]
cmd = "$HOME/.cargo/bin/cos-cli state -i {subject.metadata.index} --fullscreen"
