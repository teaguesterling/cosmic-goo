name = "git"
tier = "core"
description = "Git repositories — open, status, pull, GitHub PRs"

[[types]]
name = "application/vnd.git.repo"
display = "git repository"
kind = "handle"

[[sources]]
name = "repos"
prefix = "repo"
icon = "folder-git"
emits = "application/vnd.git.repo"
enumerate = false   # many repos; reach on demand: :repo/<name> (value) or :repo:<query>
# Discover repos under GOO_GIT_ROOTS (default ~/Projects ~/.dotfiles). -L
# follows the common ~/Projects -> /mnt/... symlink. .path is the worktree.
list_cmd = """find -L ${GOO_GIT_ROOTS:-$HOME/Projects $HOME/.dotfiles} -maxdepth 2 -type d -name .git 2>/dev/null \\
  | sed 's|/.git$||' \\
  | jq -Rsc 'split("\\n")[:-1] | map({id: ., title: (. | split("/") | last), subtitle: ., metadata: {path: .}})'"""

[[verbs]]
name = "open-repo"
description = "Open the repository in the file manager"
accepts = ["application/vnd.git.repo"]
default_for = "application/vnd.git.repo"
cmd = "xdg-open {subject.metadata.path|q}"

[[verbs]]
name = "git-status"
description = "Show short status"
accepts = ["application/vnd.git.repo"]
cmd = "git -C {subject.metadata.path|q} status -sb"

[[verbs]]
name = "git-pull"
description = "Pull the current branch"
accepts = ["application/vnd.git.repo"]
cmd = "git -C {subject.metadata.path|q} pull"
confirm = true

[[verbs]]
name = "gh-pr-list"
description = "List open GitHub PRs"
accepts = ["application/vnd.git.repo"]
cmd = "cd {subject.metadata.path|q} && gh pr list"

# ---- git branches (a second handle type in this plugin) ----

[[types]]
name = "application/vnd.git.branch"
display = "git branch"
kind = "handle"

[[sources]]
name = "branches"
prefix = "br"
emits = "application/vnd.git.branch"
enumerate = false   # branches of the CWD repo; reach on demand: :br/<name> (value)
list_cmd = '''git branch --format='%(refname:short)' | jq -Rsc '[splits("\n")|select(length>0)|{id:.,title:.}]' '''

[[verbs]]
name = "branch-log"
description = "Recent commits on a branch (CWD repo)"
accepts = ["application/vnd.git.branch"]
default_for = "application/vnd.git.branch"
cmd = "git log --oneline -n 15 {subject.id|q}"

[[verbs]]
name = "branch-show"
description = "Show the tip commit of a branch (CWD repo)"
accepts = ["application/vnd.git.branch"]
cmd = "git show --stat --oneline {subject.id|q} | head -n 20"
