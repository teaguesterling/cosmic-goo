name = "claude-routing"
tier = "desktop"
description = "Routes text verbs to woollama (inference), Claude Desktop, Claude Code, or clipboard"

# Templates use substitution filters (see doc/plugin-authoring.md):
#   {verb.prompt|q}    shell-quoted — safe as a bare argv / here-string token
#   {verb.prompt|uri}  percent-encoded — safe inside a single-quoted URL
# This keeps arbitrary selected content (quotes, parens, newlines, $(...))
# inert without the verbose quoted-heredoc dance.

# LEGACY shape (deprecated). The `via` adverb conflates two slots: Using: (a
# process — `woollama`) and To: (a destination — `clipboard`, `claude-desktop`,
# `claude-code`). It predates the negotiation slot model (see
# doc/design/goo-protocol.md §3 Terminology). When the Using:/To: run-path lands,
# this decomposes:
#   --via=woollama       → --using=goo://channel/woollama
#   --via=clipboard      → --to=goo://chat/clipboard
#   --via=claude-desktop → --to=goo://chat/claude-desktop
#   --via=claude-code    → --to=goo://chat/claude-code
# Until then it stays functional — critique/summarize/etc. depend on it.
[[adverbs]]
name = "via"
kind = "selector"
applies_to = ["text/*"]
default = "woollama"
description = "Where to send the rendered prompt"

# woollama is the canonical inference route: POST the rendered prompt to the local
# woollama router (~/Projects/woollama) over its Unix socket and print the model's
# reply. The `model` adverb (below) picks the backend via {model}. JSON body is
# built with `jq -n --arg` because there is no `|json` substitution filter — a
# `|q`-quoted value is one shell word, handed raw to jq, which does the escaping.
[adverbs.values.woollama]
description = "Run the prompt through the local woollama router (picks {model})"
template = '''sock="${XDG_RUNTIME_DIR:-/run/user/$(id -u)}/woollama.sock"
test -S "$sock" || { echo "goo: woollama not running ($sock)" >&2; exit 1; }
m={model|q}
resp="$(curl -sS --unix-socket "$sock" http://localhost/v1/chat/completions \
  -H 'content-type: application/json' \
  -d "$(jq -nc --arg m "${m:-ollama/qwen3:8b}" --arg p {verb.prompt|q} '{model:$m,messages:[{role:"user",content:$p}]}')")"
content="$(printf '%s' "$resp" | jq -r '.choices[0].message.content // empty' 2>/dev/null)"
if [ -n "$content" ]; then
  printf '%s\n' "$content"
else
  echo "goo: woollama: $(printf '%s' "$resp" | jq -r '.error.message // "empty or unparseable response"' 2>/dev/null)" >&2
  exit 1
fi'''

[adverbs.values.claude-desktop]
description = "Open new chat in Claude Desktop"
# Subject to the R4 quirk (recon/findings.md): Claude Desktop only reliably
# prefills on a cold start. The clipboard route is the safer fallback.
template = "xdg-open 'claude://claude.ai/new?q={verb.prompt|uri}'"

[adverbs.values.claude-code]
description = "Open a new Claude Code session"
template = "xdg-open 'claude://code/new?q={verb.prompt|uri}&folder={cwd|uri}'"

[adverbs.values.clipboard]
description = "Copy assembled prompt to clipboard"
template = "wl-copy <<< {verb.prompt|q}"


# The model picker for the woollama route. Curated aliases → real woollama model
# ids (`<provider>/<model>`), injected as {model} via template_var (the same
# pattern as urls.toml's `engine` adverb). Selector, so it shows in the
# compose-GUI adverb panel today. Full /v1/models discovery + recipes
# (woollama/<recipe>) are a follow-on. Only consumed by the woollama route; inert
# on clipboard/claude-* routes.
[[adverbs]]
name = "model"
kind = "selector"
applies_to = ["text/*"]
default = "fast"
description = "Which woollama model runs the prompt"

[adverbs.values.fast]
description = "Local qwen3:8b — quick, no API key"
template_var = { model = "ollama/qwen3:8b" }

[adverbs.values.local]
description = "Local qwen3:14b — stronger"
template_var = { model = "ollama/qwen3:14b" }

[adverbs.values.code]
description = "Local qwen2.5-coder:7b — coding"
template_var = { model = "ollama/qwen2.5-coder:7b" }

[adverbs.values.big]
description = "Local gpt-oss:20b — heaviest"
template_var = { model = "ollama/gpt-oss:20b" }


# ---------------------------------------------------------------------------
# Per-verb CLOUD model defaults (informational).
#
# From the opus-graded scribe verb evals (scoreboard v4, 15 cases). The rule:
# pick the CHEAPEST Claude tier that still scores >=4 on the verb, since Opus
# sweeps everything at 5.00 but is overkill for structured transforms. These are
# CLOUD-tier guidance (Claude); the `model` adverb above selects the actual
# woollama backend per run. Informational only — the engine does not read this
# table; the claude-desktop / claude-code routes use whatever model the app is set to.
#
# Haiku is the workhorse — it scores 4-5 on transforms (extract, memorize,
# rewrite, summarize, translate) at the lowest cost. Escalate to Sonnet for
# drafting/explaining/visualizing. Nothing defaults to Opus: it sweeps at 5.00
# but is overkill — reserve it for --depth=ultra or when a regression is
# unacceptable.
# ---------------------------------------------------------------------------

[verb_defaults]
critique = { model = "haiku" }        # 4.0 — sound reasoning at low cost
draft-response = { model = "sonnet" } # 5.0; haiku drops to 3 (no draft, only questions)
explain = { model = "sonnet" }        # 4.5; haiku 3.5
extract = { model = "haiku" }         # 3.5 (cheapest decent); sonnet face-plants at 2, opus=5 if recall must be perfect
memorize = { model = "haiku" }        # 5.0 — best value, ties opus
rewrite = { model = "haiku" }         # 4.0
summarize = { model = "haiku" }       # 4.0
think = { model = "haiku" }           # 4.0; escalate to sonnet/opus via --depth
translate = { model = "haiku" }       # 4.0
visualize = { model = "sonnet" }      # 4.0 — needs real DuckDB tool execution; haiku 3.0
# Universal ceiling: Opus scored 5.00 and won all 15 cases — use it whenever
# quality dominates cost (or via --depth=ultra).
