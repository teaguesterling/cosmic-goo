[[verbs]]
name = "copy"
description = "Copy the emoji to the clipboard"
accepts = ["application/vnd.emoji"]
default_for = "application/vnd.emoji"
# Polymorphic `copy` (Rust engine — type-dispatched). Future copy impls (a file's
# bytes to clipboard, a path string, …) coexist via accepts.
cmd = "printf %s {subject.text|q} | wl-copy"
