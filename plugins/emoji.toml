name = "emoji"
tier = "desktop"
description = "Unicode emoji picker — pick and copy"

# Items emit a vendor `application/vnd.emoji` type (NOT `is_a` text/plain — keeps the
# text-verbs out of the emoji picker). The default verb is the polymorphic `copy`
# (scoped to vnd.emoji here) → wl-copy the codepoint. Reach via:
#   :emo:smile    — fuzzy search by name
#   :emo:heart    — search
#   :emo/😀       — exact codepoint as the id (rarely useful at the CLI)

[[types]]
name = "application/vnd.emoji"
display = "emoji"

[[sources]]
name = "emoji"
prefix = "emo"
icon = "face-smile"
emits = "application/vnd.emoji"
enumerate = false   # ~140 items; reach via :emo:query
# A curated set of the most-used codepoints (Unicode 13 + skin-tone-neutral).
# The python heredoc is self-contained — no sidecar JSON, ships in one TOML.
# Replace or extend with the full CLDR set via a user plugin if you want
# (`[[sources]] name = "emoji"` in ~/.config/cosmic-goo/plugins/ overrides).
