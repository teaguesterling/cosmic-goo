# cosmic-goo Rust workspace.
#
# The Rust port of the engine (the bash in lib/ is the reference; the bats suite
# is the conformance contract — see doc/design/rust-port-scoping.md). Crates land
# one slice at a time, each staying green against the same tests.
#
#   goo-engine  — registry / mime / address / template / verbs / dispatch (lib)
#   goo         — thin CLI (bin)            [later slice]
#   good        — warm daemon (bin)         [later slice]
#   goo-compose — libcosmic dialog (bin)    [later slice]
[workspace]
resolver = "2"
members = ["goo-engine"]
