site_name: cosmic-goo
site_description: Grammar Of Operations — a compositional sentence layer over the COSMIC launcher.
site_url: https://cosmic-goo.readthedocs.io/
repo_url: https://github.com/teaguesterling/cosmic-goo
repo_name: teaguesterling/cosmic-goo
edit_uri: edit/main/doc/

docs_dir: doc

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - content.code.copy
    - search.highlight
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  icon:
    repo: fontawesome/brands/github

nav:
  - Intro: index.md
  - Tutorial: tutorial.md
  - CLI reference: cli-reference.md
  - Plugin authoring: plugin-authoring.md
  - Examples:
      - MS Natural 4000 bindings: examples/ms-natural-4000-bindings.md
  - Limitations & roadmap: limitations.md

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      toc_depth: 3
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true

extra:
  generator: false
